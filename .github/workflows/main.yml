name: 定时发送天气提醒

on:
  schedule:
    - cron: '30 1 * * *'   # 09:30
    - cron: '30 6 * * *'   # 14:30
    - cron: '0 9 * * *'    # 17:00
  workflow_dispatch:

jobs:
  send-weather-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 恢复缓存（记录上次发送日期）
        uses: actions/cache@v3
        id: cache
        with:
          path: |
            last_sent_today.txt
            last_sent_tomorrow.txt
          key: sent-dates-${{ github.run_id }}
          restore-keys: |
            sent-dates-

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: pip install requests

      - name: 运行天气提醒脚本
        run: python main.py
