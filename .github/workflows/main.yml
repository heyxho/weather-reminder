name: 定时发送天气提醒

on:
  schedule:
    - cron: '30 1 * * *'   # 北京时间 9:30
    - cron: '30 6 * * *'   # 北京时间 14:30
    - cron: '0 9 * * *'    # 北京时间 17:00
  workflow_dispatch:

jobs:
  send-weather-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 恢复缓存（去重记录）
        uses: actions/cache@v3
        with:
          path: |
            last_sent_today.txt
            last_sent_tomorrow.txt
          key: sent-dates-${{ github.run_id }}
          restore-keys: sent-dates-
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行脚本
        run: python main.py
        env:
          WEWORK_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK }}
