name: 定时发送天气提醒

on:
  schedule:
    # 第一个定时任务：每天北京时间 9:30 执行 (UTC时间1:30)
    - cron: '30 1 * * *'
    # 第二个定时任务：每天北京时间 17:00 执行 (UTC时间9:00)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-weather-reminder:
    runs-on: ubuntu-latest
    steps:
    - name: 获取代码
      uses: actions/checkout@v4
    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: 安装依赖
      run: pip install requests
    - name: 运行天气提醒脚本
      run: python main.py
